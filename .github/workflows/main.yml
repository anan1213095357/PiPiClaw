name: QwenCli AOT Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 使用 UPX
          - { rid: win-x64, os: windows-latest, ext: zip, exe: QwenCLI.exe, use_upx: true }
          # ARM64 禁用 UPX，依靠 7z 极限压缩
          - { rid: win-arm64, os: windows-latest, ext: zip, exe: QwenCLI.exe, use_upx: false }
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz, exe: QwenCLI, use_upx: true }
          - { rid: linux-arm64, os: ubuntu-24.04-arm, ext: tar.gz, exe: QwenCLI, use_upx: false }
          - { rid: osx-x64, os: macos-latest, ext: tar.gz, exe: QwenCLI, use_upx: false }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz, exe: QwenCLI, use_upx: false }

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Dependencies (Linux)
        if: startsWith(matrix.rid, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev build-essential 7zip

      - name: Build AOT
        run: >
          dotnet publish -c Release 
          -r ${{ matrix.rid }} 
          -p:PublishAot=true 
          -p:StripSymbols=true 
          -p:DebugType=none 
          -o ./publish_dir

      # 仅在非 ARM 且标记为 use_upx 的情况下使用 UPX
      - name: UPX Compression (x64 only)
        if: matrix.use_upx == true
        uses: svenstaro/upx-action@v2
        with:
          files: ./publish_dir/${{ matrix.exe }}
          args: --best --lzma
          strip: true

      - name: Cleanup and Packaging (Extreme Compression)
        shell: bash
        run: |
          cd ./publish_dir
          # 物理清除调试文件
          rm -rf *.pdb *.dbg *.dsym
          
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x ${{ matrix.exe }}
          fi

          # 使用 7z 代替标准 tar/zip，使用 LZMA2 算法和 9 级最高压缩
          if [ "${{ matrix.ext }}" == "zip" ]; then
            7z a -tzip -mx=9 ../QwenCli_${{ matrix.rid }}.zip *
          else
            # 对于 linux/macOS，先打包 tar，再用 7z 进行极致压缩成 .tar.gz (或直接 .7z)
            # 这里为了符合你的后缀要求，使用最高级别的 gzip 压缩，或者你也可以改为 .7z 后缀
            tar cf - * | 7z a -si -tgzip -mx=9 ../QwenCli_${{ matrix.rid }}.tar.gz
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
          make_latest: true
          prerelease: false
          append_body: true
